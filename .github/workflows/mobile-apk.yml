name: Mobile APK Build

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'mobile_app/**'
      - '.github/workflows/mobile-apk.yml'

permissions:
  contents: write

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Prepare isolated Flutter project
        shell: bash
        run: |
          set -euo pipefail
          APP_DIR="/tmp/family_todo_mobile"
          rm -rf "$APP_DIR"
          flutter create --platforms=android --project-name family_todo_mobile --org com.example "$APP_DIR"
          rm -f "$APP_DIR/android/build.gradle.kts"
          rm -f "$APP_DIR/android/app/build.gradle.kts"

          rm -rf "$APP_DIR/lib"
          cp -R mobile_app/lib "$APP_DIR/lib"
          cp mobile_app/pubspec.yaml "$APP_DIR/pubspec.yaml"
          if [ -f mobile_app/android/build.gradle ]; then
            cp mobile_app/android/build.gradle "$APP_DIR/android/build.gradle"
          fi
          if [ -f mobile_app/android/app/build.gradle ]; then
            cp mobile_app/android/app/build.gradle "$APP_DIR/android/app/build.gradle"
          fi
          if [ -f mobile_app/android/app/google-services.json ]; then
            cp mobile_app/android/app/google-services.json "$APP_DIR/android/app/google-services.json"
          fi
          if [ -f mobile_app/android/app/src/main/AndroidManifest.xml ]; then
            cp mobile_app/android/app/src/main/AndroidManifest.xml "$APP_DIR/android/app/src/main/AndroidManifest.xml"
          fi

      - name: Flutter pub get
        run: |
          cd /tmp/family_todo_mobile
          flutter pub get

      - name: Prepare release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          APP_DIR="/tmp/family_todo_mobile"
          STORE_PASSWORD="${RELEASE_KEYSTORE_PASSWORD:-}"
          KEY_ALIAS="${RELEASE_KEY_ALIAS:-}"
          KEY_PASSWORD="${RELEASE_KEY_PASSWORD:-}"

          if [ -z "${RELEASE_KEYSTORE_BASE64:-}" ] || [ -z "$STORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "::error::Missing release signing secrets. Refusing to publish APK with fallback keystore."
            exit 1
          fi
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > "$APP_DIR/android/release.keystore"
          echo "Using release keystore from GitHub secrets"
          echo "SIGNING_STORE_FILE=$APP_DIR/android/release.keystore" >> "$GITHUB_ENV"
          echo "SIGNING_STORE_PASSWORD=$STORE_PASSWORD" >> "$GITHUB_ENV"
          echo "SIGNING_KEY_ALIAS=$KEY_ALIAS" >> "$GITHUB_ENV"
          echo "SIGNING_KEY_PASSWORD=$KEY_PASSWORD" >> "$GITHUB_ENV"

      - name: Build release APK
        env:
          API_BASE_URL: http://31.129.97.211
          API_KEY: ${{ secrets.TODO_BACKEND_API_KEY }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          cd /tmp/family_todo_mobile
          set +e
          flutter build apk --release \
            --build-number="$BUILD_NUMBER" \
            --dart-define=API_BASE_URL="$API_BASE_URL" \
            --dart-define=API_KEY="${API_KEY:-dev-local-key}"
          BUILD_EXIT=$?
          set -e

          APK_PATH="/tmp/family_todo_mobile/build/app/outputs/flutter-apk/app-release.apk"
          if [ ! -f "$APK_PATH" ]; then
            APK_PATH="$(find /tmp/family_todo_mobile /tmp/family_todo_mobile/android/app/build -type f \( -path '*/flutter-apk/*release*.apk' -o -path '*/outputs/apk/*release*.apk' -o -name 'app-release.apk' \) 2>/dev/null | head -n 1 || true)"
          fi

          if [ -z "$APK_PATH" ]; then
            echo "No APK found after flutter build. Trying Gradle assembleRelease fallback..."
            (cd /tmp/family_todo_mobile/android && ./gradlew --no-daemon assembleRelease) || true
            APK_PATH="$(find /tmp/family_todo_mobile /tmp/family_todo_mobile/android/app/build -type f \( -path '*/flutter-apk/*release*.apk' -o -path '*/outputs/apk/*release*.apk' -o -name '*.apk' \) 2>/dev/null | head -n 1 || true)"
          fi

          echo "Detected APK candidates:"
          find /tmp/family_todo_mobile /tmp/family_todo_mobile/android/app/build -type f -name '*.apk' 2>/dev/null || true

          if [ -n "$APK_PATH" ]; then
            mkdir -p /tmp/family_todo_mobile/build/app/outputs/flutter-apk
            cp "$APK_PATH" /tmp/family_todo_mobile/build/app/outputs/flutter-apk/app-release.apk
          elif [ "$BUILD_EXIT" -ne 0 ]; then
            exit "$BUILD_EXIT"
          else
            echo "::error::APK file was not produced."
            exit 1
          fi

      - name: Rename artifact
        run: |
          cp /tmp/family_todo_mobile/build/app/outputs/flutter-apk/app-release.apk /tmp/family_todo_mobile/build/app/outputs/flutter-apk/family-todo-release.apk

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: family-todo-release-apk
          path: /tmp/family_todo_mobile/build/app/outputs/flutter-apk/family-todo-release.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mobile-v${{ github.run_number }}
          name: Mobile APK v${{ github.run_number }}
          files: /tmp/family_todo_mobile/build/app/outputs/flutter-apk/family-todo-release.apk
          generate_release_notes: true
