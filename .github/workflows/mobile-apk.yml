name: Mobile APK Build

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'mobile_app/**'
      - '.github/workflows/mobile-apk.yml'

permissions:
  contents: write

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ALLOWED_SIGN_SHA1_HEX: F7A5772750EC4971DBE14BEEB4144E5895DD9852,8067ED1EB450CD96421330E19BC305DD3EC553F0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Prepare isolated Flutter project
        shell: bash
        run: |
          set -euo pipefail
          APP_DIR="/tmp/family_todo_mobile"
          rm -rf "$APP_DIR"
          flutter create --platforms=android --project-name family_todo_mobile --org com.example "$APP_DIR"
          rm -f "$APP_DIR/android/build.gradle.kts"
          rm -f "$APP_DIR/android/app/build.gradle.kts"

          rm -rf "$APP_DIR/lib"
          cp -R mobile_app/lib "$APP_DIR/lib"
          cp mobile_app/pubspec.yaml "$APP_DIR/pubspec.yaml"
          if [ -f mobile_app/android/build.gradle ]; then
            cp mobile_app/android/build.gradle "$APP_DIR/android/build.gradle"
          fi
          if [ -f mobile_app/android/app/build.gradle ]; then
            cp mobile_app/android/app/build.gradle "$APP_DIR/android/app/build.gradle"
          fi
          if [ -f mobile_app/android/app/google-services.json ]; then
            cp mobile_app/android/app/google-services.json "$APP_DIR/android/app/google-services.json"
          fi
          if [ -f mobile_app/android/app/src/main/AndroidManifest.xml ]; then
            cp mobile_app/android/app/src/main/AndroidManifest.xml "$APP_DIR/android/app/src/main/AndroidManifest.xml"
          fi
          if [ -d mobile_app/android/app/src/main/kotlin ]; then
            rm -rf "$APP_DIR/android/app/src/main/kotlin"
            cp -R mobile_app/android/app/src/main/kotlin "$APP_DIR/android/app/src/main/kotlin"
          fi
          if [ -d mobile_app/android/app/src/main/java ]; then
            cp -R mobile_app/android/app/src/main/java "$APP_DIR/android/app/src/main/java"
          fi

      - name: Flutter pub get
        run: |
          cd /tmp/family_todo_mobile
          flutter pub get

      - name: Restore fallback release keystore cache
        uses: actions/cache@v4
        with:
          path: /tmp/family_todo_mobile/android/release.keystore
          key: family-todo-release-keystore-v1

      - name: Prepare release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          APP_DIR="/tmp/family_todo_mobile"
          STORE_PASSWORD="${RELEASE_KEYSTORE_PASSWORD:-familytodo123}"
          KEY_ALIAS="${RELEASE_KEY_ALIAS:-familytodo}"
          KEY_PASSWORD="${RELEASE_KEY_PASSWORD:-familytodo123}"

          if [ -n "${RELEASE_KEYSTORE_BASE64:-}" ] && [ -n "${RELEASE_KEYSTORE_PASSWORD:-}" ] && [ -n "${RELEASE_KEY_ALIAS:-}" ] && [ -n "${RELEASE_KEY_PASSWORD:-}" ]; then
            echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > "$APP_DIR/android/release.keystore"
            echo "Using release keystore from GitHub secrets"
          elif [ -f "$APP_DIR/android/release.keystore" ]; then
            echo "::warning::Using cached fallback release keystore. Configure RELEASE_KEYSTORE_* secrets for stable production signing."
          else
            echo "::warning::Generating fallback release keystore. Configure RELEASE_KEYSTORE_* secrets for stable production signing."
            keytool -genkeypair \
              -alias "$KEY_ALIAS" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 36500 \
              -storetype JKS \
              -keystore "$APP_DIR/android/release.keystore" \
              -storepass "$STORE_PASSWORD" \
              -keypass "$KEY_PASSWORD" \
              -dname "CN=Family Todo, OU=Local, O=Local, L=Moscow, S=Moscow, C=RU"
          fi
          echo "SIGNING_STORE_FILE=$APP_DIR/android/release.keystore" >> "$GITHUB_ENV"
          echo "SIGNING_STORE_PASSWORD=$STORE_PASSWORD" >> "$GITHUB_ENV"
          echo "SIGNING_KEY_ALIAS=$KEY_ALIAS" >> "$GITHUB_ENV"
          echo "SIGNING_KEY_PASSWORD=$KEY_PASSWORD" >> "$GITHUB_ENV"

      - name: Build release APK
        env:
          API_BASE_URL: http://31.129.97.211
          API_KEY: ${{ secrets.TODO_BACKEND_API_KEY }}
          BUILD_NUMBER: ${{ github.run_number }}
          APP_VERSION: 0.1.6
        run: |
          cd /tmp/family_todo_mobile
          set +e
          flutter build apk --release \
            --build-number="$BUILD_NUMBER" \
            --build-name="$APP_VERSION" \
            --dart-define=API_BASE_URL="$API_BASE_URL" \
            --dart-define=API_KEY="${API_KEY:-dev-local-key}" \
            --dart-define=APP_VERSION="$APP_VERSION"
          BUILD_EXIT=$?
          set -e

          APK_PATH="/tmp/family_todo_mobile/build/app/outputs/flutter-apk/app-release.apk"
          if [ ! -f "$APK_PATH" ]; then
            APK_PATH="$(find /tmp/family_todo_mobile /tmp/family_todo_mobile/android/app/build -type f \( -path '*/flutter-apk/*release*.apk' -o -path '*/outputs/apk/*release*.apk' -o -name 'app-release.apk' \) 2>/dev/null | head -n 1 || true)"
          fi

          if [ -z "$APK_PATH" ]; then
            echo "No APK found after flutter build. Trying Gradle assembleRelease fallback..."
            (cd /tmp/family_todo_mobile/android && ./gradlew --no-daemon assembleRelease) || true
            APK_PATH="$(find /tmp/family_todo_mobile /tmp/family_todo_mobile/android/app/build -type f \( -path '*/flutter-apk/*release*.apk' -o -path '*/outputs/apk/*release*.apk' -o -name '*.apk' \) 2>/dev/null | head -n 1 || true)"
          fi

          echo "Detected APK candidates:"
          find /tmp/family_todo_mobile /tmp/family_todo_mobile/android/app/build -type f -name '*.apk' 2>/dev/null || true

          if [ -n "$APK_PATH" ]; then
            mkdir -p /tmp/family_todo_mobile/build/app/outputs/flutter-apk
            cp "$APK_PATH" /tmp/family_todo_mobile/build/app/outputs/flutter-apk/app-release.apk
          elif [ "$BUILD_EXIT" -ne 0 ]; then
            exit "$BUILD_EXIT"
          else
            echo "::error::APK file was not produced."
            exit 1
          fi

      - name: Rename artifact
        run: |
          cp /tmp/family_todo_mobile/build/app/outputs/flutter-apk/app-release.apk /tmp/family_todo_mobile/build/app/outputs/flutter-apk/family-todo-release.apk

      - name: Verify APK signing fingerprint
        shell: bash
        run: |
          set -euo pipefail
          APK_PATH="/tmp/family_todo_mobile/build/app/outputs/flutter-apk/family-todo-release.apk"
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          if [ -z "$APKSIGNER" ]; then
            echo "::error::Android apksigner was not found."
            exit 1
          fi
          CERT_OUTPUT="$("$APKSIGNER" verify --print-certs "$APK_PATH")"
          echo "$CERT_OUTPUT"
          ACTUAL_SHA1="$(printf '%s\n' "$CERT_OUTPUT" | sed -n 's/.*SHA-1 digest:[[:space:]]*//p' | head -n1 | tr -cd '[:xdigit:]' | tr '[:lower:]' '[:upper:]')"
          echo "APK signing SHA1 hex: ${ACTUAL_SHA1}"
          if [ -z "$ACTUAL_SHA1" ]; then
            echo "::error::Failed to read APK signing SHA1 fingerprint."
            exit 1
          fi
          if ! echo ",${ALLOWED_SIGN_SHA1_HEX}," | grep -Fq ",${ACTUAL_SHA1},"; then
            echo "::error::APK signing fingerprint is not registered in Firebase. Got ${ACTUAL_SHA1}; allowed ${ALLOWED_SIGN_SHA1_HEX}."
            exit 1
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: family-todo-release-apk
          path: /tmp/family_todo_mobile/build/app/outputs/flutter-apk/family-todo-release.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mobile-v${{ github.run_number }}
          name: Mobile APK v${{ github.run_number }}
          files: /tmp/family_todo_mobile/build/app/outputs/flutter-apk/family-todo-release.apk
          generate_release_notes: true
